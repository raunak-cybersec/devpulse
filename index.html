<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevPulse — GitHub Profile Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f8;
    --muted: #7b7b9a;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --accent3: #f472b6;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(110,231,183,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(110,231,183,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 24px; }

  /* ── HEADER ── */
  header {
    padding: 60px 0 48px;
    text-align: center;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 14px;
  }

  h1 span { color: var(--accent); }

  .tagline {
    color: var(--muted);
    font-size: 16px;
    font-weight: 300;
    margin-bottom: 40px;
  }

  /* ── SEARCH ── */
  .search-bar {
    display: flex;
    gap: 0;
    max-width: 520px;
    margin: 0 auto;
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .search-bar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(110,231,183,0.12);
  }

  .search-prefix {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    background: var(--surface2);
    padding: 0 14px;
    display: flex;
    align-items: center;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }

  #username-input {
    flex: 1;
    background: var(--surface);
    border: none;
    outline: none;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
  }

  #username-input::placeholder { color: var(--muted); }

  #search-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 14px 22px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, transform 0.1s;
  }

  #search-btn:hover { background: #a7f3d0; }
  #search-btn:active { transform: scale(0.97); }

  /* ── ERROR ── */
  #error-msg {
    display: none;
    margin: 16px auto 0;
    max-width: 520px;
    background: rgba(244,114,182,0.1);
    border: 1px solid rgba(244,114,182,0.3);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--accent3);
    font-family: var(--mono);
    text-align: left;
  }

  /* ── LOADING ── */
  #loading {
    display: none;
    text-align: center;
    padding: 60px 0;
  }

  .loader {
    display: inline-flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .loader span {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .loader span:nth-child(2) { animation-delay: 0.2s; }
  .loader span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  #loading p { color: var(--muted); font-size: 13px; font-family: var(--mono); }

  /* ── RESULTS ── */
  #results { display: none; padding-bottom: 80px; }

  /* profile card */
  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 28px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    flex-shrink: 0;
  }

  .profile-info { flex: 1; min-width: 0; }

  .profile-name {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .profile-login {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 13px;
    margin-bottom: 10px;
  }

  .profile-bio {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 14px;
  }

  .profile-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  .meta-item svg { opacity: 0.5; flex-shrink: 0; }

  /* stat grid */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .profile-card { flex-direction: column; }
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 16px;
    animation: fadeUp 0.4s ease both;
  }

  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.10s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }
  .stat-card:nth-child(4) { animation-delay: 0.20s; }

  .stat-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
  }

  /* section title */
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* languages */
  .languages-section { margin-bottom: 24px; animation: fadeUp 0.4s 0.25s ease both; }

  .lang-bars { display: flex; flex-direction: column; gap: 10px; }

  .lang-row {
    display: grid;
    grid-template-columns: 120px 1fr 48px;
    align-items: center;
    gap: 12px;
  }

  .lang-name { font-size: 13px; color: var(--text); font-family: var(--mono); }

  .lang-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .lang-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    width: 0;
  }

  .lang-pct { font-size: 12px; font-family: var(--mono); color: var(--muted); text-align: right; }

  /* repos */
  .repos-section { animation: fadeUp 0.4s 0.3s ease both; }

  .repo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

  @media (max-width: 600px) { .repo-grid { grid-template-columns: 1fr; } }

  .repo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
    text-decoration: none;
    display: block;
    color: inherit;
  }

  .repo-card:hover {
    border-color: var(--accent2);
    transform: translateY(-2px);
  }

  .repo-name {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .repo-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 36px;
  }

  .repo-meta { display: flex; gap: 14px; align-items: center; }

  .repo-lang {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .lang-dot { width: 10px; height: 10px; border-radius: 50%; }

  .repo-stars {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* footer badge */
  .built-by {
    text-align: center;
    padding: 32px 0 0;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
  }

  .built-by span { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      DevPulse
    </div>
    <h1>GitHub <span>Profile</span><br>Analyzer</h1>
    <p class="tagline">Search any GitHub username to explore their stats, repos & languages.</p>

    <div class="search-bar">
      <div class="search-prefix">github.com/</div>
      <input type="text" id="username-input" placeholder="torvalds" autocomplete="off" spellcheck="false">
      <button id="search-btn" onclick="analyze()">ANALYZE →</button>
    </div>
    <div id="error-msg"></div>
  </header>

  <div id="loading">
    <div class="loader">
      <span></span><span></span><span></span>
    </div>
    <p>fetching data...</p>
  </div>

  <div id="results">
    <!-- profile card -->
    <div class="profile-card">
      <img class="avatar" id="r-avatar" src="" alt="avatar">
      <div class="profile-info">
        <div class="profile-name" id="r-name"></div>
        <div class="profile-login" id="r-login"></div>
        <div class="profile-bio" id="r-bio"></div>
        <div class="profile-meta" id="r-meta"></div>
      </div>
    </div>

    <!-- stat cards -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Repositories</div>
        <div class="stat-value" id="s-repos">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Followers</div>
        <div class="stat-value" id="s-followers">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Following</div>
        <div class="stat-value" id="s-following">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Stars</div>
        <div class="stat-value" id="s-stars">—</div>
      </div>
    </div>

    <!-- languages -->
    <div class="languages-section">
      <div class="section-title">Top languages</div>
      <div class="lang-bars" id="r-langs"></div>
    </div>

    <!-- repos -->
    <div class="repos-section">
      <div class="section-title">Top repositories</div>
      <div class="repo-grid" id="r-repos"></div>
    </div>

    <div class="built-by">built by <span>Raunak</span> · DevPulse</div>
  </div>
</div>

<script>
const LANG_COLORS = {
  JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
  HTML: '#e34c26', CSS: '#563d7c', Java: '#b07219', 'C++': '#f34b7d',
  C: '#555555', Go: '#00ADD8', Rust: '#dea584', Ruby: '#701516',
  PHP: '#4F5D95', Swift: '#F05138', Kotlin: '#A97BFF', Shell: '#89e051',
  Vue: '#41b883', default: '#6ee7b7'
};

function fmt(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n;
}

async function analyze() {
  const username = document.getElementById('username-input').value.trim();
  if (!username) return;

  const err = document.getElementById('error-msg');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');

  err.style.display = 'none';
  results.style.display = 'none';
  loading.style.display = 'block';

  try {
    const [userRes, reposRes] = await Promise.all([
      fetch(`https://api.github.com/users/${username}`),
      fetch(`https://api.github.com/users/${username}/repos?per_page=100&sort=stars`)
    ]);

    if (!userRes.ok) throw new Error(userRes.status === 404 ? `User "${username}" not found.` : 'GitHub API error. Try again.');

    const user = await userRes.json();
    const repos = await reposRes.json();

    loading.style.display = 'none';
    results.style.display = 'block';

    // profile
    document.getElementById('r-avatar').src = user.avatar_url;
    document.getElementById('r-name').textContent = user.name || username;
    document.getElementById('r-login').textContent = '@' + user.login;
    document.getElementById('r-bio').textContent = user.bio || '';

    const meta = [];
    if (user.location) meta.push(`<div class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${user.location}</div>`);
    if (user.company) meta.push(`<div class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>${user.company}</div>`);
    if (user.blog) meta.push(`<div class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg><a href="${user.blog}" target="_blank" style="color:var(--accent2)">${user.blog.replace(/https?:\/\//,'')}</a></div>`);
    document.getElementById('r-meta').innerHTML = meta.join('');

    // stats
    document.getElementById('s-repos').textContent = fmt(user.public_repos);
    document.getElementById('s-followers').textContent = fmt(user.followers);
    document.getElementById('s-following').textContent = fmt(user.following);
    const totalStars = repos.reduce((a, r) => a + r.stargazers_count, 0);
    document.getElementById('s-stars').textContent = fmt(totalStars);

    // languages
    const langCount = {};
    repos.forEach(r => { if (r.language) langCount[r.language] = (langCount[r.language] || 0) + 1; });
    const sortedLangs = Object.entries(langCount).sort((a,b) => b[1]-a[1]).slice(0, 6);
    const maxLang = sortedLangs[0]?.[1] || 1;
    const totalLang = sortedLangs.reduce((s, [,v]) => s + v, 0);

    document.getElementById('r-langs').innerHTML = sortedLangs.map(([lang, count]) => {
      const pct = Math.round(count / totalLang * 100);
      const color = LANG_COLORS[lang] || LANG_COLORS.default;
      return `<div class="lang-row">
        <div class="lang-name">${lang}</div>
        <div class="lang-bar-bg"><div class="lang-bar-fill" data-pct="${pct}" style="background:${color}"></div></div>
        <div class="lang-pct">${pct}%</div>
      </div>`;
    }).join('');

    // animate bars after render
    setTimeout(() => {
      document.querySelectorAll('.lang-bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 50);

    // top repos
    const topRepos = repos.filter(r => !r.fork).sort((a,b) => b.stargazers_count - a.stargazers_count).slice(0, 6);
    document.getElementById('r-repos').innerHTML = topRepos.map(r => {
      const color = LANG_COLORS[r.language] || LANG_COLORS.default;
      return `<a class="repo-card" href="${r.html_url}" target="_blank">
        <div class="repo-name">${r.name}</div>
        <div class="repo-desc">${r.description || 'No description provided.'}</div>
        <div class="repo-meta">
          ${r.language ? `<div class="repo-lang"><div class="lang-dot" style="background:${color}"></div>${r.language}</div>` : ''}
          <div class="repo-stars">★ ${r.stargazers_count}</div>
        </div>
      </a>`;
    }).join('');

  } catch(e) {
    loading.style.display = 'none';
    err.style.display = 'block';
    err.textContent = '> error: ' + e.message;
  }
}

document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

// auto-search if ?u= param
const params = new URLSearchParams(location.search);
if (params.get('u')) {
  document.getElementById('username-input').value = params.get('u');
  analyze();
}
</script>
</body>
</html>
